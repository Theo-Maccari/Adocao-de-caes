<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>Patas & Cia</h1>
    </header>

    <form id="forms">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" placeholder="Insira seu nome">
        <br>

        <label for="idade">Idade:</label>
        <input type="text" id="idade" placeholder="Insira sua idade">
        <br>

        <label for="cpf">CPF:</label>
        <input type="text" id="cpf" placeholder="Insira seu CPF">
        <br>

        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Insira seu email">
        <br>

        <label for="telefone">Telefone:</label>
        <input type="tel" id="telefone" placeholder="Insira seu telefone">
        <br>

        <label for="Cidade">Cidade:</label>
        <input type="text" id="cidade" placeholder="Insira sua cidade">
        <br>

        <label for="moradia">Moradia:</label>
        <select name="moradia" id="moradia">
            <option value="casa">Casa</option>
            <option value="apartemento">Apartamento</option>
        </select>
        <br>

        <label for="quintal">Possui quintal?</label>
        <input type="radio" name="quntal" value="sim">Sim
        <input type="radio" name="quntal" value="nao">Não
        <br>

        <label for="pet">Já teve pet antes?</label>
        <input type="radio" name="pet" value="sim">Sim
        <input type="radio" name="pet" value="nao">Não
        <br>

        <label for="horas">Quantas horas o animal ficará sozinho por dia?</label>
        <input type="text" id="horas" placeholder="Insira a quantidade de horas">
        <br>

        <label for="motivo">Insira o motivo da adoção</label>
        <br>
        <textarea name="Insira o motivo" id="motivo"></textarea>

    </form>

</body>

</html>
